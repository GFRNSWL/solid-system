<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#07111f" />
  <title>摸鱼贪吃蛇</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(12, 20, 36, .84);
      --line: rgba(140, 180, 255, .15);
      --text: #eaf3ff;
      --muted: #9fb2cf;
      --accent: #64e3a1;
      --accent-2: #68b9ff;
      --warn: #ff7474;
      --gold: #ffd56a;
      --shadow: 0 24px 60px rgba(0, 0, 0, .45);
      --r: 22px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(104,185,255,.16), transparent 26%),
        radial-gradient(circle at 80% 15%, rgba(100,227,161,.14), transparent 24%),
        radial-gradient(circle at 50% 85%, rgba(255,213,106,.09), transparent 28%),
        linear-gradient(180deg, #07111f, #04070d 68%, #020406);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle, black 36%, transparent 85%);
      opacity: .35; pointer-events: none;
    }
    #app {
      min-height: 100%; display: grid; place-items: center; padding: 14px;
    }
    .shell {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(300px, .85fr);
      gap: 16px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(14,22,40,.9), rgba(8,13,24,.95));
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }
    .game {
      display: grid; grid-template-rows: auto 1fr auto;
      min-height: 0;
    }
    .hud {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.07);
      background: linear-gradient(90deg, rgba(12,20,35,.95), rgba(17,28,51,.78));
    }
    .title h1 { margin: 0; font-size: 18px; }
    .title p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; min-width: min(580px, 100%); }
    .stat {
      padding: 10px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.035);
    }
    .stat span { display: block; }
    .stat .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat .value { font-size: 18px; font-weight: 700; }
    .stage {
      position: relative; min-height: 0; padding: 14px; display: grid; place-items: center;
    }
    canvas {
      width: min(100%, 640px); height: auto; aspect-ratio: 1 / 1;
      border-radius: 20px; background:
        radial-gradient(circle at 50% 38%, rgba(100,227,161,.12), transparent 24%),
        linear-gradient(180deg, rgba(8,16,29,.98), rgba(6,10,18,1));
      border: 1px solid rgba(255,255,255,.08);
      touch-action: none; image-rendering: pixelated;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .overlay {
      position: absolute; inset: 14px; display: grid; place-items: center; pointer-events: none;
    }
    .panel {
      width: min(440px, 92%); padding: 22px; border-radius: 24px; text-align: center;
      border: 1px solid rgba(255,255,255,.1); background: linear-gradient(180deg, rgba(12,20,35,.94), rgba(9,14,25,.95));
      pointer-events: auto; box-shadow: 0 18px 44px rgba(0,0,0,.34); display: none;
    }
    .panel.show { display: block; }
    .panel h2 { margin: 0 0 10px; font-size: 30px; }
    .panel p { margin: 0 0 14px; line-height: 1.65; color: var(--muted); }
    .row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    button, .chip {
      appearance: none; border: 1px solid rgba(255,255,255,.11); color: var(--text);
      background: rgba(255,255,255,.07); border-radius: 14px; cursor: pointer;
      padding: 11px 14px; font-size: 14px; transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }
    button:hover, .chip:hover { transform: translateY(-1px); }
    button.primary { background: linear-gradient(135deg, rgba(100,227,161,.95), rgba(104,185,255,.95)); color: #07111b; font-weight: 700; border-color: transparent; }
    button.danger { background: linear-gradient(135deg, rgba(255,116,116,.95), rgba(255,213,106,.95)); color: #1d0b0b; font-weight: 700; border-color: transparent; }
    .side { padding: 16px; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
    .section {
      padding: 14px; border-radius: 18px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    }
    .section h3 { margin: 0 0 10px; font-size: 16px; }
    .chips { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .chip.active { background: rgba(100,227,161,.18); border-color: rgba(100,227,161,.42); }
    .pad {
      display: none; grid-template-columns: repeat(3, 64px); grid-template-rows: repeat(3, 64px);
      justify-content: center; gap: 10px; padding-top: 6px;
    }
    .pad button { width: 64px; height: 64px; padding: 0; font-size: 18px; border-radius: 18px; }
    .pad .blank { visibility: hidden; }
    .hint { color: var(--muted); line-height: 1.7; font-size: 12px; }
    @media (max-width: 980px) {
      body { overflow: auto; }
      #app { padding: 10px; }
      .shell { grid-template-columns: 1fr; }
      .side { order: -1; }
      .stats { min-width: 0; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pad { display: grid; }
    }
    @media (max-width: 520px) {
      .hud { flex-direction: column; align-items: stretch; }
      .title { text-align: center; }
      .panel h2 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="shell">
      <section class="card game">
        <div class="hud">
          <div class="title">
            <h1>摸鱼贪吃蛇</h1>
            <p>方向键 / WASD 走位，空格暂停，R 重开</p>
          </div>
          <div class="stats">
            <div class="stat"><span class="label">分数</span><span class="value" id="score">0</span></div>
            <div class="stat"><span class="label">最高分</span><span class="value" id="best">0</span></div>
            <div class="stat"><span class="label">速度</span><span class="value" id="speedName">正常</span></div>
            <div class="stat"><span class="label">状态</span><span class="value" id="status">待开始</span></div>
          </div>
        </div>
        <div class="stage">
          <canvas id="game" width="640" height="640" aria-label="贪吃蛇游戏画布"></canvas>
          <div class="overlay">
            <div class="panel show" id="panel">
              <h2 id="panelTitle">准备摸鱼</h2>
              <p id="panelText">吃掉食物，别撞墙，也别咬到自己。试试看你能拿多少分。</p>
              <div class="row">
                <button class="primary" id="startBtn">开始游戏</button>
                <button id="resumeBtn" style="display:none;">继续</button>
                <button class="danger" id="restartBtn">重新开始</button>
              </div>
            </div>
          </div>
        </div>
        <div style="padding: 0 14px 14px;">
          <div class="pad" aria-label="触屏方向键">
            <div class="blank"></div>
            <button data-dir="up">▲</button>
            <div class="blank"></div>
            <button data-dir="left">◀</button>
            <button data-act="pause">⏯</button>
            <button data-dir="right">▶</button>
            <div class="blank"></div>
            <button data-dir="down">▼</button>
            <div class="blank"></div>
          </div>
        </div>
      </section>

      <aside class="card side">
        <section class="section">
          <h3>难度选择</h3>
          <div class="chips">
            <button class="chip" data-speed="easy">轻松</button>
            <button class="chip active" data-speed="normal">正常</button>
            <button class="chip" data-speed="hard">上头</button>
          </div>
        </section>
        <section class="section">
          <h3>玩法说明</h3>
          <div class="hint">
            1. 吃到食物 +10 分<br />
            2. 撞墙或咬到自己就结束<br />
            3. 最高分会保存在本机浏览器里<br />
            4. 手机上可以直接点方向键玩
          </div>
        </section>
        <section class="section">
          <h3>小提示</h3>
          <div class="hint">
            走一步看三步，别急着转弯。<br />
            如果想继续挑战，按 R 可以立刻重开。
          </div>
        </section>
      </aside>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const speedNameEl = document.getElementById('speedName');
      const statusEl = document.getElementById('status');
      const panel = document.getElementById('panel');
      const panelTitle = document.getElementById('panelTitle');
      const panelText = document.getElementById('panelText');
      const startBtn = document.getElementById('startBtn');
      const resumeBtn = document.getElementById('resumeBtn');
      const restartBtn = document.getElementById('restartBtn');
      const speedButtons = [...document.querySelectorAll('[data-speed]')];
      const padButtons = [...document.querySelectorAll('.pad button')];

      const GRID = 20;
      const CELL = canvas.width / GRID;
      const STORAGE = 'moyu-snake-best-v1';
      const SPEEDS = {
        easy:   { name: '轻松', step: 180 },
        normal: { name: '正常', step: 125 },
        hard:   { name: '上头', step: 88 },
      };
      const DIRS = {
        up:    { x: 0, y: -1 },
        down:  { x: 0, y: 1 },
        left:  { x: -1, y: 0 },
        right: { x: 1, y: 0 },
      };

      const state = {
        running: false,
        paused: false,
        over: false,
        speed: 'normal',
        score: 0,
        best: 0,
        snake: [],
        dir: DIRS.right,
        nextDir: DIRS.right,
        food: { x: 0, y: 0 },
        last: 0,
        acc: 0,
        step: SPEEDS.normal.step,
        shake: 0,
      };

      const save = () => localStorage.setItem(STORAGE, String(state.best));
      const load = () => {
        const n = Number(localStorage.getItem(STORAGE) || 0);
        if (Number.isFinite(n)) state.best = n;
      };

      function same(a, b) { return a.x === b.x && a.y === b.y; }
      function key(p) { return `${p.x},${p.y}`; }
      function inside(p) { return p.x >= 0 && p.x < GRID && p.y >= 0 && p.y < GRID; }
      function rand(n) { return Math.floor(Math.random() * n); }

      function occupied() {
        const s = new Set(state.snake.map(key));
        return s;
      }

      function spawnFood() {
        const s = occupied();
        let p;
        do p = { x: rand(GRID), y: rand(GRID) }; while (s.has(key(p)));
        state.food = p;
      }

      function setSpeed(name) {
        state.speed = name;
        state.step = SPEEDS[name].step;
        speedNameEl.textContent = SPEEDS[name].name;
        speedButtons.forEach(b => b.classList.toggle('active', b.dataset.speed === name));
        if (!state.running) updatePanel();
      }

      function updateHUD() {
        scoreEl.textContent = state.score;
        bestEl.textContent = state.best;
        speedNameEl.textContent = SPEEDS[state.speed].name;
        statusEl.textContent = state.over ? '结束' : state.paused ? '暂停' : state.running ? '运行中' : '待开始';
      }

      function updatePanel() {
        const idle = !state.running || state.paused || state.over;
        panel.classList.toggle('show', idle);
        panelTitle.textContent = state.over ? '游戏结束' : state.paused ? '已暂停' : '准备摸鱼';
        panelText.textContent = state.over
          ? `本局得分 ${state.score}，最高分 ${state.best}。按开始或重开再来一局。`
          : state.paused
            ? '先歇一会儿，想继续就点继续。'
            : '吃掉食物，别撞墙，也别咬到自己。试试看你能拿多少分。';
        startBtn.style.display = state.running && !state.over ? 'none' : 'inline-block';
        resumeBtn.style.display = state.paused ? 'inline-block' : 'none';
      }

      function reset(keepBest = true) {
        state.running = false;
        state.paused = false;
        state.over = false;
        state.score = 0;
        state.acc = 0;
        state.shake = 0;
        state.dir = DIRS.right;
        state.nextDir = DIRS.right;
        state.snake = [
          { x: 6, y: 10 },
          { x: 5, y: 10 },
          { x: 4, y: 10 },
        ];
        if (!keepBest) state.best = 0;
        spawnFood();
        updateHUD();
        updatePanel();
      }

      function startGame(fromPause = false) {
        if (!fromPause || state.over) reset(true);
        state.running = true;
        state.paused = false;
        state.over = false;
        state.last = performance.now();
        panel.classList.remove('show');
        statusEl.textContent = '运行中';
        requestAnimationFrame(loop);
      }

      function pauseGame() {
        if (!state.running || state.over) return;
        state.paused = true;
        updatePanel();
        updateHUD();
      }

      function resumeGame() {
        if (!state.running || state.over) return startGame(true);
        state.paused = false;
        state.last = performance.now();
        updatePanel();
        updateHUD();
      }

      function gameOver(reason) {
        state.running = false;
        state.paused = false;
        state.over = true;
        state.best = Math.max(state.best, state.score);
        save();
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
        panelText.textContent = `${reason} 本局得分 ${state.score}，最高分 ${state.best}。`;
        updateHUD();
        updatePanel();
      }

      function turn(name) {
        const next = DIRS[name];
        if (!next) return;
        if (state.dir.x + next.x === 0 && state.dir.y + next.y === 0) return;
        state.nextDir = next;
      }

      function step() {
        state.dir = state.nextDir;
        const head = state.snake[0];
        const next = { x: head.x + state.dir.x, y: head.y + state.dir.y };
        if (!inside(next)) return gameOver('撞墙了。');
        if (state.snake.some((seg, i) => i > 0 && same(seg, next))) return gameOver('咬到自己了。');

        state.snake.unshift(next);
        if (same(next, state.food)) {
          state.score += 10;
          state.best = Math.max(state.best, state.score);
          if (navigator.vibrate) navigator.vibrate(20);
          spawnFood();
        } else {
          state.snake.pop();
        }
        updateHUD();
      }

      function drawBackground() {
        const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
        g.addColorStop(0, '#08111f');
        g.addColorStop(1, '#050910');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.globalAlpha = .12;
        for (let x = 0; x < GRID; x++) {
          for (let y = 0; y < GRID; y++) {
            ctx.fillStyle = (x + y) % 2 ? 'rgba(255,255,255,.015)' : 'rgba(255,255,255,.03)';
            ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
          }
        }
        ctx.restore();
      }

      function roundRect(x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function drawFood() {
        const { x, y } = state.food;
        const t = performance.now() / 120;
        const pulse = 0.18 * Math.sin(t) + 0.84;
        ctx.save();
        ctx.translate(x * CELL + CELL / 2, y * CELL + CELL / 2);
        ctx.scale(pulse, pulse);
        ctx.shadowColor = '#ffd56a';
        ctx.shadowBlur = 16;
        ctx.fillStyle = '#ffd56a';
        ctx.beginPath();
        ctx.arc(0, 0, CELL * .24, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#a9ffb6';
        ctx.beginPath();
        ctx.ellipse(-3, -11, 4, 8, -.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawSnake() {
        state.snake.forEach((seg, i) => {
          const px = seg.x * CELL;
          const py = seg.y * CELL;
          const pad = i === 0 ? 2 : 3.3;
          ctx.save();
          ctx.shadowColor = i === 0 ? 'rgba(104,185,255,.85)' : 'rgba(100,227,161,.5)';
          ctx.shadowBlur = i === 0 ? 18 : 10;
          ctx.fillStyle = i === 0 ? '#defbff' : 'rgba(100,227,161,.94)';
          roundRect(px + pad, py + pad, CELL - pad * 2, CELL - pad * 2, 12);
          ctx.fill();
          ctx.restore();

          if (i === 0) {
            ctx.save();
            ctx.fillStyle = '#07111b';
            const cx = px + CELL / 2 + state.dir.x * 4;
            const cy = py + CELL / 2 + state.dir.y * 4;
            ctx.beginPath();
            ctx.arc(cx - state.dir.y * 5, cy + state.dir.x * 5, 2.2, 0, Math.PI * 2);
            ctx.arc(cx + state.dir.y * 5, cy - state.dir.x * 5, 2.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        });
      }

      function drawOverlayText() {
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,.9)';
        ctx.font = '700 16px Microsoft YaHei, sans-serif';
        ctx.fillText(state.over ? '游戏结束' : state.paused ? '已暂停' : '运行中', 18, 28);
        ctx.restore();
      }

      function draw(dt = 0) {
        const shake = state.shake > 0 ? (Math.random() - .5) * state.shake : 0;
        ctx.save();
        ctx.translate(shake, shake);
        drawBackground();
        drawFood();
        drawSnake();
        drawOverlayText();
        ctx.restore();
      }

      function loop(now) {
        if (!state.running) { draw(0); return; }
        if (state.paused) { draw(0); state.last = now; requestAnimationFrame(loop); return; }
        const dt = Math.min(40, now - state.last);
        state.last = now;
        state.acc += dt;
        while (state.acc >= state.step) {
          state.acc -= state.step;
          step();
          if (state.over) break;
        }
        if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 0.8);
        draw(dt);
        if (!state.over) requestAnimationFrame(loop);
      }

      function fit() {
        const size = Math.min(640, Math.max(280, Math.floor(Math.min(window.innerWidth * .88, window.innerHeight * .68))));
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        canvas.width = Math.floor(size * dpr);
        canvas.height = Math.floor(size * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.scale(canvas.width / size / dpr, canvas.height / size / dpr);
        draw(0);
      }

      function bindUI() {
        startBtn.onclick = () => { if (state.over || !state.running) startGame(); else resumeGame(); };
        resumeBtn.onclick = resumeGame;
        restartBtn.onclick = () => { reset(true); startGame(); };
        speedButtons.forEach(btn => btn.onclick = () => setSpeed(btn.dataset.speed));
        padButtons.forEach(btn => btn.onclick = () => {
          const d = btn.dataset.dir;
          const a = btn.dataset.act;
          if (d) turn(d);
          if (a === 'pause') {
            if (state.running && !state.over) (state.paused ? resumeGame() : pauseGame());
            else startGame();
          }
        });
        window.addEventListener('keydown', e => {
          const k = e.key.toLowerCase();
          if (['arrowup', 'w'].includes(k)) { e.preventDefault(); turn('up'); }
          else if (['arrowdown', 's'].includes(k)) { e.preventDefault(); turn('down'); }
          else if (['arrowleft', 'a'].includes(k)) { e.preventDefault(); turn('left'); }
          else if (['arrowright', 'd'].includes(k)) { e.preventDefault(); turn('right'); }
          else if (k === ' ') { e.preventDefault(); if (state.running && !state.over) (state.paused ? resumeGame() : pauseGame()); }
          else if (k === 'enter') { e.preventDefault(); if (!state.running || state.over) startGame(); }
          else if (k === 'r') { e.preventDefault(); reset(true); startGame(); }
        }, { passive: false });
        canvas.addEventListener('pointerdown', e => {
          const r = canvas.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width;
          const y = (e.clientY - r.top) / r.height;
          const dx = x - .5, dy = y - .5;
          if (Math.abs(dx) > Math.abs(dy)) turn(dx > 0 ? 'right' : 'left');
          else turn(dy > 0 ? 'down' : 'up');
        });
      }

      load();
      bindUI();
      setSpeed('normal');
      reset(true);
      updateHUD();
      fit();
      window.addEventListener('resize', fit);
      draw(0);
    })();
  </script>
</body>
</html>
